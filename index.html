<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- debajo del hero -->
    <section class="catalogo">
      <div class="catalogo-header">
        <h2 class="catalogo-titulo">Colección</h2>
        <p class="catalogo-desc">Piezas seleccionadas para esta temporada</p>
      </div>

      <div class="catalogo-grid">
        <article class="producto">
          <div class="producto-img">
            <img
              src="https://images.unsplash.com/photo-1632149933606-fa45623682ee?q=80&w=467&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt="Gabardina"
            />
            <span class="producto-tag">Nuevo</span>
          </div>
          <div class="producto-info">
            <h3 class="producto-nombre">Gabardina</h3>
            <p class="producto-talla">S · M · L · XL</p>
            <span class="producto-precio">₡124,000</span>
          </div>
        </article>

        <article class="producto">
          <div class="producto-img">
            <img
              src="https://images.pexels.com/photos/16410118/pexels-photo-16410118.jpeg"
              alt="Camisa"
            />
          </div>
          <div class="producto-info">
            <h3 class="producto-nombre">Camisa Cuello Tortuga</h3>
            <p class="producto-talla">S · M · L</p>
            <span class="producto-precio">₡48,000</span>
          </div>
        </article>

        <article class="producto">
          <div class="producto-img">
            <img
              src="https://images.pexels.com/photos/14656709/pexels-photo-14656709.jpeg"
              alt="Blusa"
            />
            <span class="producto-tag">Destacado</span>
          </div>
          <div class="producto-info">
            <h3 class="producto-nombre">Blusa seda</h3>
            <p class="producto-talla">XS · S · M · L</p>
            <span class="producto-precio">₡54,000</span>
          </div>
        </article>

        <article class="producto">
          <div class="producto-img">
            <img
              src="https://images.unsplash.com/photo-1473966968600-fa801b869a1a?w=600&q=80"
              alt="Pantalón"
            />
          </div>
          <div class="producto-info">
            <h3 class="producto-nombre">Pantalón wide</h3>
            <p class="producto-talla">S · M · L · XL</p>
            <span class="producto-precio">₡62,000</span>
          </div>
        </article>

        <article class="producto">
          <div class="producto-img">
            <img
              src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=600&q=80"
              alt="Accesorio"
            />
            <span class="producto-tag">Último</span>
          </div>
          <div class="producto-info">
            <h3 class="producto-nombre">Bolso tejido</h3>
            <p class="producto-talla">Talla única</p>
            <span class="producto-precio">₡38,000</span>
          </div>
        </article>
      </div>
    </section>
  </body>
</html>
