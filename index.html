<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="hero">
      <div class="hero-content">
        <span class="hero-call">Colección Otoño 2026</span>

        <h1 class="hero-title">
          Ropa que<br />
          habla por<br />
          <em>sí sola.</em>
        </h1>

        <p class="hero-desc">
          Piezas atemporales diseñadas para durar. Materiales de calidad,
          siluetas que se adaptan a tu vida.
        </p>

        <div class="hero-actions">
          <a href="#" class="btn-primary">Ver catálogo</a>
          <a href="#" class="btn-ghost">Conocer más</a>
        </div>

        <div class="hero-stats">
          <div>
            <span class="stat-num">+200</span>
            <span class="stat-label">Piezas disponibles</span>
          </div>
          <div>
            <span class="stat-num">S–XL</span>
            <span class="stat-label">Tallas inclusivas</span>
          </div>
          <div>
            <span class="stat-num">CR</span>
            <span class="stat-label">Envío nacional</span>
          </div>
        </div>
      </div>

      <div class="hero-image">
        <div class="badge">
          <span class="badge-top">Destacado</span>
          <span class="badge-val">Lana & Tejidos</span>
        </div>
        <img
          src="https://images.pexels.com/photos/14686151/pexels-photo-14686151.jpeg"
          alt="Hero deco"
        />
      </div>
    </section>
  </body>
</html>
